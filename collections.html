<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--bg);--bg2:var(--bg2);--card:var(--card);--card2:var(--card2);
  --or:var(--or);--or2:var(--or2);--or-dim:rgba(212,175,55,.1);--or-line:rgba(212,175,55,.18);
  --ink:var(--ink);--slate:var(--stone);--stone:var(--stone);--muted:var(--muted);
  --green:#3FB950;--red:#E74C3C;
  --ff-d:'Cormorant Garamond',Georgia,serif;
  --ff-b:'DM Sans',system-ui,sans-serif;
  --ff-m:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.16,1,.3,1);
  --pad:clamp(1rem,5vw,2.5rem);
}
html,body{min-height:100%;font-family:var(--ff-b);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad);background:rgba(8,9,14,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--or-line)}
.nav-logo{font-family:var(--ff-d);font-size:1.25rem;font-weight:500;color:var(--ink)}
.nav-logo em{color:var(--or);font-style:italic;font-weight:300;margin-left:3px}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-links a{font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--or)}
@media(max-width:640px){.nav-links{display:none}}
.nav-right{display:flex;gap:2px}
.nav-icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:var(--stone);transition:.2s;position:relative}
.nav-icon:hover{background:var(--or-dim);color:var(--or)}
.nav-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nb{position:absolute;top:5px;right:5px;min-width:15px;height:15px;border-radius:8px;background:var(--or);color:var(--bg);font-size:.57rem;font-weight:700;display:none;place-items:center;padding:0 3px}
.nb.on{display:grid}

/* PAGE HEAD */
.page-head{padding:clamp(4.5rem,8vw,6rem) var(--pad) clamp(2rem,4vw,3rem);border-bottom:1px solid rgba(212,175,55,.08)}
.ph-kicker{font-family:var(--ff-m);font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--or);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.ph-kicker::before{content:'';width:28px;height:1px;background:rgba(212,175,55,.35)}
.ph-title{font-family:var(--ff-d);font-size:clamp(2.8rem,7vw,5rem);font-weight:300;line-height:1.05;letter-spacing:-.02em;margin-bottom:.9rem}
.ph-title em{color:var(--or);font-style:italic}
.ph-sub{font-size:.95rem;color:var(--stone);line-height:1.7;max-width:500px}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:clamp(2rem,5vw,4rem) var(--pad) 5rem}

/* ── TEASER COLLECTION EN COURS ── */
.teaser{
  position:relative;overflow:hidden;
  border-radius:8px;margin-bottom:3rem;
  height:clamp(260px,45vh,400px);
  display:flex;align-items:flex-end;
  background:linear-gradient(135deg,var(--bg2) 0%,var(--card) 100%);
}
.teaser-imgs{
  position:absolute;inset:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:2px;opacity:.5;
}
@media(max-width:480px){.teaser-imgs{grid-template-columns:1fr 1fr}}
.teaser-img{
  background:var(--card2) center/contain no-repeat;
  transition:transform 6s ease;
}
.teaser:hover .teaser-img{transform:scale(1.02)}
.teaser-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,9,14,.97) 0%,rgba(8,9,14,.6) 50%,rgba(8,9,14,.15) 100%);
}
.teaser-content{position:relative;z-index:1;padding:clamp(1.5rem,4vw,2.5rem);width:100%}
.teaser-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:var(--ff-m);font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  padding:.32rem .9rem;border-radius:2px;margin-bottom:1.1rem;
}
.teaser-badge.live{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.teaser-badge.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:livepulse 1.4s ease infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.2}}
.teaser-badge.soon{background:var(--or-dim);border:1px solid var(--or-line);color:var(--or)}
.teaser-name{font-family:var(--ff-d);font-size:clamp(2rem,5vw,3.8rem);font-weight:300;letter-spacing:-.02em;color:var(--ink);line-height:1.05;margin-bottom:.6rem}
.teaser-desc{font-size:clamp(.82rem,1.8vw,.95rem);color:var(--stone);line-height:1.65;max-width:480px;margin-bottom:1.5rem}
.teaser-meta{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1.75rem}
.teaser-meta-item{font-family:var(--ff-m);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(212,175,55,.5);display:flex;align-items:center;gap:.35rem}
.teaser-meta-item::before{content:'·';color:rgba(212,175,55,.3)}
.teaser-meta-item:first-child::before{display:none}
.teaser-actions{display:flex;flex-wrap:wrap;gap:.75rem}
.btn-voir{display:inline-flex;align-items:center;gap:.6rem;padding:.8rem 1.75rem;background:var(--or);color:var(--bg);border-radius:3px;font-size:.76rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:.2s}
.btn-voir:hover{background:var(--or2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,175,55,.3)}
.btn-notif{display:inline-flex;align-items:center;gap:.6rem;padding:.8rem 1.5rem;background:#25D366;color:#fff;border-radius:3px;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:.2s}
.btn-notif:hover{background:#1fb856;transform:translateY(-1px)}

/* APERÇU PIÈCES dans le teaser */
.teaser-pieces{
  position:absolute;right:0;top:0;bottom:0;width:min(40%,320px);
  display:flex;flex-direction:column;gap:2px;overflow:hidden;
}
@media(max-width:640px){.teaser-pieces{display:none}}
.teaser-piece{flex:1;background:var(--card2) center/cover no-repeat;opacity:.7}

/* ── SECTION TITRE ── */
.sec-label{font-family:var(--ff-m);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.sec-label::before{content:'';width:22px;height:1px;background:rgba(212,175,55,.35)}
.sec-title{font-family:var(--ff-d);font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:300;letter-spacing:-.02em;color:var(--ink);margin-bottom:1.75rem}
.sec-title em{color:var(--or);font-style:italic}
.divider{height:1px;background:rgba(212,175,55,.07);margin:2.5rem 0}

/* ── CATALOGUE CARDS ── */
.catalogue{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));gap:1rem}
@media(max-width:480px){.catalogue{grid-template-columns:repeat(2,1fr);gap:.75rem}}

.c-card{background:var(--card);border:1px solid rgba(250,250,247,.07);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .25s,transform .25s var(--ease)}
.c-card:hover{border-color:rgba(212,175,55,.25);transform:translateY(-3px)}
.c-img{aspect-ratio:1/1;background:var(--card2) center/cover no-repeat;position:relative;overflow:hidden}
.c-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.c-card:hover .c-img img{transform:scale(1.05)}
.c-badge{position:absolute;top:.5rem;left:.5rem;font-family:var(--ff-m);font-size:.54rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .5rem;border-radius:2px}
.c-badge.bon{background:rgba(212,175,55,.8);color:var(--bg)}
.c-badge.neuf{background:var(--green);color:#fff}
.c-badge.recon{background:#3A6FA8;color:#fff}
.c-body{padding:.8rem .9rem;flex:1;display:flex;flex-direction:column;gap:.3rem}
.c-nom{font-family:var(--ff-d);font-size:1rem;font-weight:400;color:var(--ink);line-height:1.25}
.c-prix{font-family:var(--ff-d);font-size:1.1rem;font-weight:600;color:var(--or);margin-top:auto}
.c-stock{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--green)}
.c-stock.low{color:var(--red)}

/* ── PROCHAINE COLLECTION ── */
.next-col{padding:1.75rem 2rem;border:1px solid var(--or-line);border-radius:12px;background:linear-gradient(135deg,rgba(212,175,55,.07) 0%,rgba(212,175,55,.03) 100%);display:flex;flex-wrap:wrap;gap:1.25rem;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.next-col::before{content:"✦";position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:4rem;opacity:.06;color:var(--or);pointer-events:none}
  margin-top:2.5rem;padding:1.75rem;
  background:rgba(212,175,55,.05);border:1px dashed rgba(212,175,55,.25);
  border-radius:6px;display:flex;flex-wrap:wrap;gap:1.25rem;align-items:center;justify-content:space-between;
}
.next-col-label{font-family:var(--ff-m);font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin-bottom:.45rem}
.next-col-name{font-family:var(--ff-d);font-size:1.3rem;font-weight:300;color:var(--ink)}
.next-col-desc{font-size:.82rem;color:var(--stone);margin-top:.25rem}

/* ── COLLECTION PASSÉE ── */
.past-col{padding:1rem 1.25rem 1rem 1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:.6rem;background:var(--card);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;transition:border-color .2s}
.past-col:hover{border-color:var(--or-line)}
.past-col-inner{display:flex;align-items:center;gap:.9rem}
.past-col-thumb{width:48px;height:48px;border-radius:7px;background:var(--card2) center/cover no-repeat;flex-shrink:0;border:1px solid var(--border)}
.past-col:hover{background:rgba(255,255,255,.04)}
.past-name{font-family:var(--ff-d);font-size:1rem;font-weight:400;color:var(--stone)}
.past-badge{font-family:var(--ff-m);font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;display:block}
.past-stock{font-size:.8rem;color:var(--muted)}
.btn-ghost-sm{padding:.45rem .95rem;border:1px solid var(--border);border-radius:99px;font-size:.67rem;font-weight:600;letter-spacing:.05em;color:var(--stone);transition:.2s;flex-shrink:0;white-space:nowrap}
.btn-ghost-sm:hover{border-color:var(--or-line);color:var(--or)}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:400px 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:400px 0}100%{background-position:-400px 0}}

/* WA FLOAT */
.wa-float{position:fixed;bottom:18px;right:16px;z-index:500;width:52px;height:52px;border-radius:50%;background:#25D366;display:grid;place-items:center;box-shadow:0 4px 16px rgba(37,211,102,.4);transition:.22s}
.wa-float:hover{transform:translateY(-3px) scale(1.06)}
.wa-float svg{width:26px;height:26px;fill:#fff}

/* FOOTER */
.footer{background:#060710;border-top:1px solid rgba(212,175,55,.08);padding:2rem var(--pad) 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem}
.footer p,.footer a{font-size:.75rem;color:var(--muted);transition:color .2s}
.footer a:hover{color:var(--or)}
.foot-links{display:flex;gap:1.25rem;flex-wrap:wrap}
</style>

<script>
const SB='https://axgpohmhzmdgozndlntj.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4Z3BvaG1oem1kZ296bmRsbnRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTIzOTMsImV4cCI6MjA5MTQ4ODM5M30.gukLxSpuLUPWOivsC-LgbNYIsnTWOuo0_G2ubYur3os';

async function get(table,params=''){
  try{
    const r=await fetch(`${SB}/rest/v1/${table}?${params}`,{headers:{'apikey':AK,'Authorization':`Bearer ${AK}`,'Accept':'application/json'}});
    if(!r.ok){console.warn('[SB]',table,r.status);return[]}
    return r.json();
  }catch(e){return[]}
}
function px(n){return Math.round(n||0).toLocaleString('fr-FR')+' FCFA'}
function im(u){if(!u)return'';if(u.startsWith('http'))return u;return`${SB}/storage/v1/object/public/photos/${u}`}
function badge(e){const s=(e||'').toLowerCase();return s.includes('neuf')?'<span class="c-badge neuf">Neuf</span>':s.includes('bon')?'<span class="c-badge bon">Bon état</span>':s.includes('recon')?'<span class="c-badge recon">Recon.</span>':''}
function stock(q){if(!q||q===0)return'<span class="c-stock" style="color:var(--muted)">Épuisé</span>';if(q<=3)return`<span class="c-stock low">⚡ ${q} restant${q>1?'s':''}</span>`;return'<span class="c-stock">En stock</span>'}

async function render(){
  const [cols,allArts]=await Promise.all([
    get('collections','statut=neq.epuisee&order=statut.asc,created_at.desc'),
    get('articles','select=reference,nom,prix_vente_fcfa,photo_url,quantite,etat&order=created_at.desc&limit=20')
  ]);

  const enCours=cols.filter(c=>c.statut==='en_cours');
  const aVenir=cols.filter(c=>c.statut==='a_venir');
  const passees=cols.filter(c=>c.statut==='passee');

  // Charger articles des collections en cours
  const colArts={};
  if(enCours.length||passees.length){
    const allCols=[...enCours,...passees];
    await Promise.all(allCols.map(async col=>{
      const liens=await get('collection_articles',`collection_id=eq.${col.id}&limit=6`);
      if(!liens.length){colArts[col.id]=[];return}
      const refs=liens.map(l=>`"${l.article_ref}"`).join(',');
      colArts[col.id]=await get('articles',`reference=in.(${refs})&select=reference,nom,prix_vente_fcfa,photo_url,quantite,etat&limit=6`);
    }));
  }

  let html='';

  // ── TEASER COLLECTION EN COURS ──
  if(enCours.length){
    const col=enCours[0];
    const arts=colArts[col.id]||[];
    const nb=arts.length;
    const nbStock=arts.reduce((s,a)=>s+(a.quantite||0),0);
    
    // Images du teaser (3 pièces sur desktop)
    const tImgs=arts.slice(0,3).map(a=>`<div class="teaser-img" style="background-image:url('${im(a.photo_url)}')"></div>`).join('')
      ||'<div class="teaser-img"></div><div class="teaser-img"></div><div class="teaser-img"></div>';

    html+=`
    <div class="teaser">
      <div class="teaser-imgs">${tImgs}</div>
      <div class="teaser-overlay"></div>
      <div class="teaser-content">
        <span class="teaser-badge live">● Collection active</span>
        <div class="teaser-name">${col.nom}</div>
        ${col.description?`<p class="teaser-desc">${col.description}</p>`:''}
        <div class="teaser-meta">
          <span class="teaser-meta-item">${nb} pièce${nb>1?'s':''}</span>
          <span class="teaser-meta-item">${nbStock} en stock</span>
          <span class="teaser-meta-item">Paiement à la récupération</span>
          <span class="teaser-meta-item">Thiès</span>
        </div>
        <div class="teaser-actions">
          <a href="collection.html?id=${col.id}" class="btn-voir">Voir toute la collection →</a>
        </div>
      </div>
    </div>`;

    // Catalogue de la collection en cours
    if(arts.length){
      html+=`<div class="sec-label">Pièces disponibles</div>
      <h2 class="sec-title">${col.nom} — <em>${nb} article${nb>1?'s':''}</em></h2>
      <div class="catalogue">
        ${arts.map(a=>`
          <a href="produit.html?ref=${a.reference}" class="c-card">
            <div class="c-img">
              ${a.photo_url?`<img src="${im(a.photo_url)}" alt="${a.nom}" loading="lazy" onerror="this.style.display='none'">`:''}
              ${badge(a.etat)}
            </div>
            <div class="c-body">
              <div class="c-nom">${a.nom}</div>
              <div class="c-prix">${px(a.prix_vente_fcfa)}</div>
              ${stock(a.quantite)}
            </div>
          </a>`).join('')}
      </div>`;
    }
  }

  // ── PROCHAINE COLLECTION ──
  if(aVenir.length){
    if(html) html+=`<div class="divider"></div>`;
    const nc=aVenir[0];
    html+=`
    <div class="next-col">
      <div>
        <div class="next-col-label">✦ Prochain arrivage</div>
        <div class="next-col-name">${nc.nom}</div>
        ${nc.description?`<div class="next-col-desc">${nc.description}</div>`:''}
      </div>
      <a href="https://wa.me/221778038874?text=${encodeURIComponent(`Bonjour, je veux être notifié en avant-première pour la collection "${nc.nom}" de SenExport.`)}" class="btn-notif" target="_blank" rel="noopener">
        💬 Être notifié en premier
      </a>
    </div>`;
  }

  // ── COLLECTIONS PASSÉES ──
  const passeesAvecStock=passees.filter(c=>(colArts[c.id]||[]).some(a=>a.quantite>0));
  if(passeesAvecStock.length){
    if(html) html+=`<div class="divider"></div>`;
    html+=`<div class="sec-label">Archives</div><h2 class="sec-title">Collections <em>précédentes</em></h2>`;
    html+=passeesAvecStock.map(col=>{
      const arts=colArts[col.id]||[];
      const nb=arts.reduce((s,a)=>s+(a.quantite||0),0);
      return`<div class="past-col">
        <div class="past-col-inner">
          <div class="past-col-thumb" style="${(colArts[col.id]||[])[0]?.photo_url ? `background-image:url('${im((colArts[col.id]||[])[0].photo_url)}')` : ''}"></div>
          <div>
          <span class="past-badge">Collection précédente</span>
          </div>
        </div>
          <div class="past-stock">${nb} pièce${nb>1?'s':''} encore disponible${nb>1?'s':''}</div>
        </div>
        <a href="collection.html?id=${col.id}" class="btn-ghost-sm">Voir les pièces →</a>
      </div>`;
    }).join('');
  }

  // Rien à afficher
  if(!html){
    html=`<div style="text-align:center;padding:5rem 1.5rem;color:var(--stone)">
      <div style="font-size:2.5rem;margin-bottom:1rem;opacity:.4">✦</div>
      <p style="font-family:var(--ff-d);font-size:1.4rem;font-weight:300;margin-bottom:.75rem;color:var(--ink)">Arrivage en préparation</p>
      <p style="font-size:.9rem;margin-bottom:2rem">Le prochain arrivage est en cours de sélection. Restez connectés.</p>
      <a href="https://wa.me/221778038874?text=${encodeURIComponent('Bonjour, je veux être informé des prochains arrivages SenExport.')}" class="btn-notif" target="_blank" rel="noopener" style="margin:0 auto">💬 Être notifié sur WhatsApp</a>
    </div>`;
  }

  document.getElementById('main-content').innerHTML=html;

  // Badge panier
  try{const n=SE?.Cart?.count?.()??0;const b=document.getElementById('cart-badge');if(b){b.textContent=n||'';b.classList.toggle('on',n>0)}}catch(e){}
}

render();
</script>
</body>
</html>
