<style>
:root{
  --green-bright:#2ea566;
}
.page-wrap{max-width:840px;margin:0 auto;padding:24px 20px 60px}

.back-link{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--stone);text-decoration:none;font-size:.9rem;
  margin-bottom:18px;transition:.2s;
}
.back-link:hover{color:var(--or)}

/* Hero status */
.hero-status{
  background:linear-gradient(135deg,var(--card) 0%,#1A1B26 100%);
  border:1px solid rgba(212,175,55,.2);
  border-radius:16px;
  padding:24px 22px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.hero-status::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--or), #F5E09A, var(--or));
}
.hero-status .num-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;background:rgba(212,175,55,.12);
  color:var(--or);border-radius:99px;font-size:.72rem;font-weight:700;
  font-family:'JetBrains Mono',monospace;letter-spacing:.06em;
  border:1px solid rgba(212,175,55,.25);margin-bottom:12px;
}
.hero-status h1{
  font-size:clamp(1.4rem,4vw,2rem);font-weight:400;margin:0 0 6px;
  color:var(--ink);line-height:1.15;letter-spacing:-.02em;
  font-family:'Cormorant Garamond',Georgia,serif;
}
.hero-status .sub{
  font-size:.9rem;color:var(--stone);margin-bottom:0;
}
.hero-status .icon-big{
  font-size:2.5rem;float:right;margin-left:16px;
  line-height:1;margin-top:-4px;
}
.hero-status.cancelled{
  background:linear-gradient(135deg,#1A0A0A 0%,#200D0D 100%);
  border-color:rgba(231,76,60,.25);
}
.hero-status.cancelled::before{background:linear-gradient(90deg,#E74C3C,#C0392B)}

/* Big tracker */
.big-tracker{
  background:var(--card);border:1px solid rgba(212,175,55,.15);
  border-radius:var(--r20);padding:36px 28px;
  margin-bottom:20px;
}
.big-tracker h2{
  font-size:.78rem;font-weight:700;color:var(--stone);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px;
}

.bt-line{
  position:relative;display:flex;justify-content:space-between;
  align-items:flex-start;
}
.bt-line::before{
  content:'';position:absolute;
  top:24px;left:24px;right:24px;
  height:4px;background:rgba(212,175,55,.1);
  border-radius:9999px;z-index:1;
}
.bt-fill{
  position:absolute;top:24px;left:24px;
  height:4px;background:linear-gradient(90deg,var(--green),var(--green-bright));
  border-radius:9999px;z-index:2;
  transition:width 1s cubic-bezier(0.4,0,0.2,1);
}

.bt-step{
  flex:1;display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:3;
}
.bt-dot{
  width:52px;height:52px;border-radius:50%;
  background:var(--card);border:4px solid rgba(212,175,55,.1);
  display:grid;place-items:center;
  font-size:1.4rem;
  opacity:.45;
  transition:.4s;
}
.bt-step.active .bt-dot,.bt-step.current .bt-dot{opacity:1}
.bt-step.active .bt-dot{
  background:var(--green);border-color:var(--green);
  color:#fff;
}
.bt-step.current .bt-dot{
  background:var(--or);border-color:var(--or);
  color:#fff;
  box-shadow:0 0 0 6px rgba(212,107,69,.18);
  animation:pulse-big 2s infinite;
}
@keyframes pulse-big{
  0%,100%{box-shadow:0 0 0 6px rgba(212,107,69,.18)}
  50%{box-shadow:0 0 0 12px rgba(212,107,69,.05)}
}
.bt-lbl{
  font-size:.85rem;color:var(--stone);
  margin-top:12px;text-align:center;font-weight:500;
  max-width:120px;
}
.bt-step.active .bt-lbl{color:var(--ink);font-weight:600}
.bt-step.current .bt-lbl{color:var(--or);font-weight:700}

.bt-time{
  font-size:.72rem;color:var(--stone);margin-top:4px;
}

/* Estimation */
.eta-box{
  background:rgba(212,175,55,.08);border-left:3px solid var(--or);
  padding:14px 16px;border-radius:8px;
  margin-bottom:16px;display:flex;align-items:center;gap:12px;
}
.eta-box.delivered{background:rgba(63,185,80,.08);border-left-color:#3FB950}
.eta-box .icon{font-size:1.4rem}
.eta-box strong{display:block;color:var(--ink);font-size:.92rem;margin-bottom:2px}
.eta-box span{color:var(--stone);font-size:.82rem}

/* Detail cards */
.detail-card{
  background:var(--card);border:1px solid rgba(212,175,55,.15);
  border-radius:var(--r20);padding:24px 26px;
  margin-bottom:16px;
}
.detail-card h3{
  font-size:.78rem;font-weight:700;color:var(--stone);
  letter-spacing:.1em;text-transform:uppercase;
  margin:0 0 16px;display:flex;align-items:center;gap:8px;
}

/* Articles list */
.art-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px dashed rgba(212,175,55,.1);
}
.art-row:last-child{border-bottom:none}
.art-info{flex:1}
.art-name{color:var(--ink);font-weight:500;margin-bottom:2px}
.art-detail{font-size:.82rem;color:var(--stone)}
.art-price{font-weight:700;color:var(--or);font-family:var(--ff-d);font-size:1.05rem}

/* Total */
.total-block{
  margin-top:14px;padding-top:14px;border-top:2px solid var(--card);
  display:flex;justify-content:space-between;align-items:center;
}
.total-block .lbl{font-size:.95rem;color:var(--ink);font-weight:600}
.total-block .val{font-family:var(--ff-d);font-weight:700;font-size:1.6rem;color:var(--or)}

/* Address */
.address-line{
  display:flex;gap:14px;align-items:flex-start;
  padding:8px 0;
}
.address-line .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.address-line .info{flex:1}
.address-line .info-label{font-size:.78rem;color:var(--stone);margin-bottom:2px}
.address-line .info-val{color:var(--ink);font-weight:500}

/* Action buttons */
.actions{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:20px;
}
.btn-action{
  padding:14px 18px;border-radius:var(--r12);
  text-align:center;font-weight:600;font-size:.95rem;
  text-decoration:none;transition:.2s;cursor:pointer;
  border:none;
}
.btn-wa{background:#25D366;color:#fff}
.btn-wa:hover{background:#1BAD52;transform:translateY(-2px);box-shadow:0 6px 16px rgba(37,211,102,.3)}
.btn-back{background:rgba(255,255,255,.04);color:var(--ink);border:1px solid rgba(212,175,55,.15)}
.btn-back:hover{background:rgba(212,175,55,.1)}

/* Loading */
.loading-page{
  text-align:center;padding:80px 20px;
}
.loading-page .spinner{
  width:48px;height:48px;border:4px solid rgba(212,175,55,.1);
  border-top-color:var(--or);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 16px;
}
.loading-page p{color:var(--stone)}

@media (max-width:560px){
  .page-wrap{padding:16px 14px 40px}
  .hero-status{padding:22px 18px}
  .hero-status h1{font-size:1.45rem}
  .hero-status .icon-big{font-size:2.5rem}
  .big-tracker{padding:24px 12px}
  .bt-dot{width:42px;height:42px;font-size:1.1rem}
  .bt-line::before,.bt-fill{top:20px}
  .bt-lbl{font-size:.72rem;max-width:80px}
  .detail-card{padding:18px 18px}
  .actions{grid-template-columns:1fr}
}

/* ── Impression — seule la facture sort sur papier ── */
@media print{
  body *{visibility:hidden}
  #invoice-overlay,#invoice-overlay *{visibility:visible}
  #invoice-overlay{position:absolute;inset:0;background:#fff;padding:0;display:block}
  #invoice-sheet{box-shadow:none;max-width:100%}
  .no-print,#invoice-close{display:none!important}
}
</style>

<script>
const params = new URLSearchParams(window.location.search);
const cmdId = params.get('id');

if (!cmdId){
  window.location.href = 'compte.html';
}

(async function loadCommande(){
  try {
    // Wait pour que SE.sb soit dispo (DOMContentLoaded) — max 3s
    let waitSb = 0;
    while ((!SE || !SE.sb) && waitSb < 30){
      await new Promise(r => setTimeout(r, 100));
      waitSb++;
    }
    if (!SE || !SE.sb){
      console.error('[commande] SE.sb jamais initialisé');
    }
    
    // Wait for SE.Auth to be ready (DOMContentLoaded already done init)
    let attempts = 0;
    while (!SE.Auth?._inited && attempts < 20){
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    
    // Force init si pas déjà fait
    if (SE.Auth && !SE.Auth._inited){
      await SE.Auth.init();
    }
    
    // Retry getSession directement (au cas où — OAuth Google peut être lent)
    attempts = 0;
    while (!SE.Auth.currentUser && attempts < 20){
      if (SE.sb){
        try {
          const { data: { session } } = await SE.sb.auth.getSession();
          if (session?.user){
            SE.Auth.currentUser = session.user;
            await SE.Auth._loadClient();
            console.log('[commande] User retrouvé après retry', attempts);
            break;
          }
        } catch(err){ console.error('Auth retry:', err); }
      }
      await new Promise(r => setTimeout(r, 300));
      attempts++;
    }
    
    if (!SE.Auth.currentUser){
      console.warn('[commande] Pas de session trouvée après retry, redirection');
      window.location.href = 'connexion.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
      return;
    }
    
    // Charger la commande
    const cmds = await SE.Commandes.mine();
    const cmd = cmds.find(c => String(c.id) === String(cmdId));
    
    if (!cmd){
      document.getElementById('loading').innerHTML = `
        <div style="font-size:3rem;margin-bottom:14px">🤔</div>
        <p>Commande introuvable</p>
        <a href="compte.html" class="btn btn-fire" style="margin-top:14px">Retour</a>`;
      return;
    }
    
    render(cmd);
  } catch(err){
    console.error(err);
    document.getElementById('loading').innerHTML = `
      <p style="color:#DC2626">Erreur : ${err.message}</p>
      <a href="compte.html" class="btn btn-fire" style="margin-top:14px">Retour</a>`;
  }
})();

function render(cmd){
  const items = Array.isArray(cmd.articles_json) ? cmd.articles_json : [];
  const isLivraison = false;
  const isAnnulee = cmd.statut === 'annulee';
  const date = cmd.created_at ? new Date(cmd.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  
  // Mapping statut interne → étape client (4 étapes)
  const stepMap = {
    'nouvelle':       0,
    'confirmee':      1,
    'en_preparation': 1,
    'prete_retrait':  2,
    'en_livraison':   2,
    'livree':         3,
  };
  const step = stepMap[cmd.statut] !== undefined ? stepMap[cmd.statut] : 0;
  
  // Labels et icônes selon mode
  const stepData = isLivraison ? [
    {lbl:'Reçue',     icon:'📥'},
    {lbl:'Confirmée', icon:'✓'},
    {lbl:'En route',  icon:'🚚'},
    {lbl:'Livrée',    icon:'✅'},
  ] : [
    {lbl:'Reçue',     icon:'📥'},
    {lbl:'Confirmée', icon:'✓'},
    {lbl:'Prête au retrait', icon:'🏢'},
    {lbl:'Récupérée', icon:'✅'},
  ];
  
  // Hero message selon statut
  let heroIcon = '📦', heroTitle = '', heroSub = '';
  if (isAnnulee){
    heroIcon = '❌';
    heroTitle = 'Commande annulée';
    heroSub = "Cette commande n'a pas pu être traitée.";
  } else {
    switch(cmd.statut){
      case 'nouvelle':
        heroIcon = '🎉';
        heroTitle = 'Merci pour votre commande !';
        heroSub = 'Nous l\'avons bien reçue. Nous vous contacterons sous peu pour confirmer.';
        break;
      case 'confirmee':
        heroIcon = '✓';
        heroTitle = 'Commande confirmée';
        heroSub = 'Nous préparons votre commande. Elle sera bientôt prête.';
        break;
      case 'en_preparation':
        heroIcon = '✓';
        heroTitle = 'Commande confirmée';
        heroSub = 'Nous préparons votre commande. Elle sera bientôt prête.';
        break;
      case 'prete_retrait':
        heroIcon = '🏢';
        heroTitle = 'Prête au retrait !';
        heroSub = 'Vous pouvez passer la récupérer au dépôt à Thiès.';
        break;
      case 'en_livraison':
        heroIcon = '🚚';
        heroTitle = 'En route vers vous !';
        heroSub = 'Notre livreur est en chemin avec votre commande.';
        break;
      case 'livree':
        heroIcon = '✅';
        heroTitle = isLivraison ? 'Commande livrée !' : 'Commande récupérée !';
        heroSub = 'Nous espérons que vous êtes satisfait. Merci de votre confiance.';
        break;
    }
  }
  
  // Estimation (boîte jaune ou verte)
  let etaHTML = '';
  if (!isAnnulee){
    if (cmd.statut === 'livree'){
      etaHTML = `
        <div class="eta-box delivered">
          <span class="icon">🎉</span>
          <div>
            <strong>Commande terminée</strong>
            <span>N'hésitez pas à nous laisser un avis sur WhatsApp</span>
          </div>
        </div>`;
    } else if (cmd.statut === 'en_livraison'){
      etaHTML = `
        <div class="eta-box">
          <span class="icon">⏰</span>
          <div>
            <strong>Livraison aujourd'hui</strong>
            <span>Notre livreur va vous contacter</span>
          </div>
        </div>`;
    } else if (cmd.statut === 'prete_retrait'){
      etaHTML = `
        <div class="eta-box">
          <span class="icon">📍</span>
          <div>
            <strong>Disponible au dépôt</strong>
            <span>Apportez votre numéro de commande</span>
          </div>
        </div>`;
    }
  }
  
  // Points de retrait — affichés quand la commande est prête (hors livraison)
  // ⚠️ COORDONNÉES PLACEHOLDER pour le dépôt — à remplacer par la vraie position à Thiès
  const DEPOT_LAT = 14.7910, DEPOT_LNG = -16.9359;
  const DEPOT_ADDR = 'Dépôt SenExport, Thiès, Sénégal';
  const DEPOT_POINT = { id:'depot', label:'Dépôt SenExport', adresse: DEPOT_ADDR, lat: DEPOT_LAT, lng: DEPOT_LNG };

  // points_retrait : configurés par Ahmed selon la taille du produit (en attendant le
  // logiciel desktop, fixé à la main dans Supabase). S'il n'y en a qu'un ou aucun, pas
  // de choix à faire — on prend directement le dépôt par défaut.
  const pointsRetrait = (Array.isArray(cmd.points_retrait) && cmd.points_retrait.length) ? cmd.points_retrait : [DEPOT_POINT];
  const pointChoisi = cmd.point_retrait_choisi || (pointsRetrait.length === 1 ? pointsRetrait[0] : null);

  let mapHTML = '';
  if (!isAnnulee && cmd.statut === 'prete_retrait' && !isLivraison) {
    if (!pointChoisi && pointsRetrait.length > 1) {
      // Plusieurs points proposés pour cette commande → le client choisit
      const choicesHTML = pointsRetrait.map(p => `
        <button type="button" class="btn-action btn-back pickup-choice" data-point-id="${p.id}"
          style="width:100%;text-align:left;margin-bottom:.5rem;display:flex;flex-direction:column;align-items:flex-start;gap:2px">
          <strong>${p.label||''}</strong>
          <span style="font-size:.78rem;color:var(--stone);font-weight:400">${p.adresse||''}</span>
        </button>`).join('');
      mapHTML = `
        <div class="detail-card" id="depot-map-card">
          <h3>📍 Choisissez votre point de retrait</h3>
          <p style="font-size:.85rem;color:var(--stone);margin-bottom:.85rem">Plusieurs points sont disponibles pour cette commande — choisissez celui qui vous arrange.</p>
          <div id="pickup-choices">${choicesHTML}</div>
          <p id="pickup-error" style="font-size:.8rem;color:var(--red);display:none;margin-top:.5rem"></p>
        </div>`;
    } else {
      const point = pointChoisi || pointsRetrait[0];
      const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${point.lat},${point.lng}`;
      mapHTML = `
        <div class="detail-card" id="depot-map-card" data-lat="${point.lat}" data-lng="${point.lng}">
          <h3>📍 Où récupérer votre commande</h3>
          <div id="leaflet-map" style="height:260px;border-radius:8px;overflow:hidden;border:1px solid rgba(212,175,55,.1);margin-bottom:.85rem;background:#1a1a1a"></div>
          <p style="font-size:.85rem;color:var(--ink);margin-bottom:.15rem"><strong>${point.label||''}</strong></p>
          <p style="font-size:.8rem;color:var(--stone);margin-bottom:.5rem">${point.adresse||''}</p>
          <p id="depot-distance" style="font-size:.78rem;color:var(--muted);margin-bottom:.85rem"></p>
          <div style="display:flex;gap:.6rem;flex-wrap:wrap">
            <a href="${dirUrl}" target="_blank" rel="noopener" class="btn-action" style="background:var(--or);color:#fff;flex:1;text-align:center;min-width:160px">🧭 Ouvrir dans Maps</a>
            <button id="btn-locate-me" class="btn-action btn-back" style="flex:1;min-width:160px">📌 Tracer l'itinéraire</button>
          </div>
        </div>`;
    }
  }

  // Facture auto-générée — affichée une fois la commande récupérée / livrée
  let invoiceHTML = '';
  if (!isAnnulee && cmd.statut === 'livree') {
    invoiceHTML = `
      <div class="detail-card">
        <h3>🧾 Facture</h3>
        <p style="font-size:.85rem;color:var(--stone);margin-bottom:.85rem">Votre facture est prête. Vous pouvez l'imprimer ou l'enregistrer en PDF.</p>
        <button id="btn-show-invoice" class="btn-action" style="background:var(--ink);color:#fff;width:100%;text-align:center">📄 Voir la facture</button>
      </div>`;
  }

  // Tracker visuel
  let trackerHTML = '';
  if (!isAnnulee){
    const progressPct = (step / (stepData.length - 1)) * 100;
    const dots = stepData.map((s, i) => {
      const isActive = i <= step;
      const isCurrent = i === step;
      return `
        <div class="bt-step ${isActive ? 'active' : ''} ${isCurrent ? 'current' : ''}">
          <div class="bt-dot">${isActive ? (isCurrent ? s.icon : '✓') : s.icon}</div>
          <div class="bt-lbl">${s.lbl}</div>
        </div>`;
    }).join('');
    
    trackerHTML = `
      <div class="big-tracker">
        <h2>📊 Suivi de votre commande</h2>
        <div class="bt-line">
          <div class="bt-fill" style="width:calc(${progressPct}% - ${progressPct < 100 ? '0px' : '0px'})"></div>
          ${dots}
        </div>
      </div>`;
  }
  
  // Articles
  const itemsHTML = items.map(it => `
    <div class="art-row">
      <div class="art-info">
        <div class="art-name">${it.nom || '—'}</div>
        <div class="art-detail">Quantité : ${it.qte || 1} × ${SE.fprix(it.prix || 0)}</div>
      </div>
      <div class="art-price">${SE.fprix((it.prix||0) * (it.qte||1))}</div>
    </div>`).join('');
  
  const tel = '221778038874';

function initLeafletMap(lat, lng) {
  const map = L.map('leaflet-map', { zoomControl: true, attributionControl: false }).setView([lat, lng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.marker([lat, lng]).addTo(map).bindPopup('Point de retrait').openPopup();
  return map;
}

/* Trace l'itinéraire (routier) entre le client et le point de retrait via OSRM — gratuit, sans clé */
async function drawRoute(map, fromLat, fromLng, toLat, toLng, distEl) {
  const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.routes || !data.routes.length) throw new Error('Pas d\'itinéraire trouvé');
  const route = data.routes[0];
  const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

  if (map._seRoute) map.removeLayer(map._seRoute);
  map._seRoute = L.polyline(coords, { color: '#C4531A', weight: 4 }).addTo(map);
  L.marker([fromLat, fromLng]).addTo(map).bindPopup('Vous êtes ici');
  map.fitBounds(map._seRoute.getBounds(), { padding: [24, 24] });

  const km = (route.distance / 1000).toFixed(1);
  const min = Math.round(route.duration / 60);
  distEl.textContent = `${km} km · environ ${min} min en voiture.`;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
